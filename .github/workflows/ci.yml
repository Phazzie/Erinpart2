name: CI

on:
  pull_request:
  push:
    branches: [feat/erins-escapades-full-implementation, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full check suite
        run: npm run typecheck && npm run lint
        env:
          # Provide mock environment variables for CI
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_mock_key_for_ci
          CLERK_SECRET_KEY: sk_test_mock_key_for_ci
          NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_mock_key_for_ci
          CLERK_SECRET_KEY: sk_test_mock_key_for_ci
          NEXT_PUBLIC_SUPABASE_URL: https://mock.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: mock_anon_key
        continue-on-error: true
